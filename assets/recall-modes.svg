<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0f1628"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="280" fill="url(#bg4)" rx="16"/>
  <text x="600" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#e2e8f0" letter-spacing="1">5 RETRIEVAL MODES</text>
  <!-- Precise -->
  <g transform="translate(30, 65)">
    <rect width="215" height="190" rx="10" fill="#111827" stroke="#1e3a5f" stroke-width="1"/>
    <rect x="14" y="14" width="187" height="28" rx="6" fill="#0d2847"/>
    <text x="108" y="33" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#00d4ff">precise</text>
    <text x="14" y="66" font-family="system-ui, sans-serif" font-size="12" fill="#e2e8f0" font-weight="600">Exact chunk match</text>
    <text x="14" y="88" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Fast, targeted retrieval.</text>
    <text x="14" y="106" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Returns only matched</text>
    <text x="14" y="124" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">content chunks.</text>
    <rect x="14" y="140" width="70" height="20" rx="4" fill="#0d2847"/>
    <text x="49" y="154" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#5ce0d2">~500 tokens</text>
    <rect x="90" y="140" width="50" height="20" rx="4" fill="#0d2847"/>
    <text x="115" y="154" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4ade80">fast</text>
  </g>
  <!-- Session -->
  <g transform="translate(265, 65)">
    <rect width="215" height="190" rx="10" fill="#111827" stroke="#3b2e7e" stroke-width="1"/>
    <rect x="14" y="14" width="187" height="28" rx="6" fill="#1a1040"/>
    <text x="108" y="33" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#c4b5fd">session</text>
    <text x="14" y="66" font-family="system-ui, sans-serif" font-size="12" fill="#e2e8f0" font-weight="600">Full session context</text>
    <text x="14" y="88" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Expands matched chunks</text>
    <text x="14" y="106" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">to complete session</text>
    <text x="14" y="124" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">histories.</text>
    <rect x="14" y="140" width="70" height="20" rx="4" fill="#1a1040"/>
    <text x="49" y="154" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#c4b5fd">~2k tokens</text>
    <rect x="90" y="140" width="60" height="20" rx="4" fill="#1a1040"/>
    <text x="120" y="154" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#c4b5fd">detailed</text>
  </g>
  <!-- Structured -->
  <g transform="translate(500, 65)">
    <rect width="215" height="190" rx="10" fill="#111827" stroke="#1e3a5f" stroke-width="1"/>
    <rect x="14" y="14" width="187" height="28" rx="6" fill="#0d2847"/>
    <text x="108" y="33" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#f59e0b">structured</text>
    <text x="14" y="66" font-family="system-ui, sans-serif" font-size="12" fill="#e2e8f0" font-weight="600">DB-only, no vectors</text>
    <text x="14" y="88" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Narratives + tasks +</text>
    <text x="14" y="106" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">knowledge cards.</text>
    <text x="14" y="124" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Fastest mode.</text>
    <rect x="14" y="140" width="70" height="20" rx="4" fill="#0d2847"/>
    <text x="49" y="154" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#fbbf24">~1-2k tokens</text>
    <rect x="90" y="140" width="60" height="20" rx="4" fill="#0d2847"/>
    <text x="120" y="154" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4ade80">fastest</text>
  </g>
  <!-- Hybrid -->
  <g transform="translate(735, 65)">
    <rect width="215" height="190" rx="10" fill="#111827" stroke="#00d4ff" stroke-width="1.5"/>
    <rect x="14" y="14" width="187" height="28" rx="6" fill="#0a2a3f"/>
    <text x="108" y="33" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#00d4ff">hybrid (default)</text>
    <text x="14" y="66" font-family="system-ui, sans-serif" font-size="12" fill="#e2e8f0" font-weight="600">Structured + vectors</text>
    <text x="14" y="88" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Best of both worlds.</text>
    <text x="14" y="106" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Structured data + top-K</text>
    <text x="14" y="124" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">vector results.</text>
    <rect x="14" y="140" width="70" height="20" rx="4" fill="#0a2a3f"/>
    <text x="49" y="154" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#5ce0d2">~2-4k tokens</text>
    <rect x="90" y="140" width="80" height="20" rx="4" fill="#0a2a3f"/>
    <text x="130" y="154" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#00d4ff">recommended</text>
  </g>
  <!-- Auto -->
  <g transform="translate(970, 65)">
    <rect width="215" height="190" rx="10" fill="#111827" stroke="#1e3a5f" stroke-width="1"/>
    <rect x="14" y="14" width="187" height="28" rx="6" fill="#0d2847"/>
    <text x="108" y="33" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#f472b6">auto</text>
    <text x="14" y="66" font-family="system-ui, sans-serif" font-size="12" fill="#e2e8f0" font-weight="600">Smart mode selection</text>
    <text x="14" y="88" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Automatically detects</text>
    <text x="14" y="106" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">the best retrieval</text>
    <text x="14" y="124" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">strategy from query.</text>
    <rect x="14" y="140" width="70" height="20" rx="4" fill="#0d2847"/>
    <text x="49" y="154" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#f9a8d4">adaptive</text>
    <rect x="90" y="140" width="50" height="20" rx="4" fill="#0d2847"/>
    <text x="115" y="154" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#f9a8d4">smart</text>
  </g>
</svg>