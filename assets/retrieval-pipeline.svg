<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480">
  <defs>
    <linearGradient id="rpbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0f1628"/>
    </linearGradient>
    <linearGradient id="rpflow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b68ee"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="480" fill="url(#rpbg)" rx="16"/>
  <text x="600" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#e2e8f0" letter-spacing="1">HOW AWARENESS RETURNS THE RIGHT CONTEXT</text>
  <text x="600" y="66" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Hybrid retrieval pipeline: structured DB + vector search + intelligent ranking</text>

  <!-- Stage 1: Query -->
  <g transform="translate(30, 95)">
    <rect width="200" height="160" rx="12" fill="#111827" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="100" cy="30" r="16" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="100" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#00d4ff">1</text>
    <text x="100" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#e2e8f0">Query Analysis</text>
    <text x="100" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Detect intent:</text>
    <text x="100" y="98" text-anchor="middle" font-family="monospace" font-size="9" fill="#5ce0d2">debug | architecture</text>
    <text x="100" y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#5ce0d2">planning | personal</text>
    <text x="100" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Extract keywords</text>
    <text x="100" y="146" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">for BM25 search</text>
  </g>
  <!-- Arrow -->
  <g transform="translate(235, 170)"><line x1="0" y1="0" x2="30" y2="0" stroke="url(#rpflow)" stroke-width="2"/><polygon points="30,-4 38,0 30,4" fill="#00d4ff"/></g>

  <!-- Stage 2: Dual search -->
  <g transform="translate(275, 95)">
    <rect width="200" height="160" rx="12" fill="#111827" stroke="#7b68ee" stroke-width="1.5"/>
    <circle cx="100" cy="30" r="16" fill="none" stroke="#7b68ee" stroke-width="1.5"/>
    <text x="100" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#7b68ee">2</text>
    <text x="100" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#e2e8f0">Dual Search</text>
    <rect x="15" y="72" width="170" height="24" rx="4" fill="#0d2847"/>
    <text x="100" y="88" text-anchor="middle" font-family="monospace" font-size="10" fill="#5ce0d2">Vector (cosine sim)</text>
    <rect x="15" y="102" width="170" height="24" rx="4" fill="#1a1040"/>
    <text x="100" y="118" text-anchor="middle" font-family="monospace" font-size="10" fill="#c4b5fd">BM25 (keyword)</text>
    <text x="100" y="146" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Both run in parallel</text>
  </g>
  <!-- Arrow -->
  <g transform="translate(480, 170)"><line x1="0" y1="0" x2="30" y2="0" stroke="url(#rpflow)" stroke-width="2"/><polygon points="30,-4 38,0 30,4" fill="#7b68ee"/></g>

  <!-- Stage 3: RRF merge -->
  <g transform="translate(520, 95)">
    <rect width="200" height="160" rx="12" fill="#111827" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="100" cy="30" r="16" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="100" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f59e0b">3</text>
    <text x="100" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#e2e8f0">RRF Fusion</text>
    <text x="100" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Reciprocal Rank Fusion</text>
    <text x="100" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">merges both result sets</text>
    <rect x="15" y="112" width="170" height="20" rx="4" fill="#2a1a0a"/>
    <text x="100" y="126" text-anchor="middle" font-family="monospace" font-size="9" fill="#fbbf24">rrf_score = 1/(k+rank)</text>
    <text x="100" y="146" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">+ chunk reconstruction</text>
  </g>
  <!-- Arrow -->
  <g transform="translate(725, 170)"><line x1="0" y1="0" x2="30" y2="0" stroke="url(#rpflow)" stroke-width="2"/><polygon points="30,-4 38,0 30,4" fill="#f59e0b"/></g>

  <!-- Stage 4: Structured merge -->
  <g transform="translate(760, 95)">
    <rect width="200" height="160" rx="12" fill="#111827" stroke="#4ade80" stroke-width="1.5"/>
    <circle cx="100" cy="30" r="16" fill="none" stroke="#4ade80" stroke-width="1.5"/>
    <text x="100" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4ade80">4</text>
    <text x="100" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#e2e8f0">Structured Merge</text>
    <text x="100" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Add from structured DB:</text>
    <text x="100" y="100" text-anchor="middle" font-family="monospace" font-size="9" fill="#86efac">knowledge_cards</text>
    <text x="100" y="114" text-anchor="middle" font-family="monospace" font-size="9" fill="#86efac">day_narratives</text>
    <text x="100" y="128" text-anchor="middle" font-family="monospace" font-size="9" fill="#86efac">open_tasks + risks</text>
    <text x="100" y="146" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Intent-based card boost</text>
  </g>
  <!-- Arrow -->
  <g transform="translate(965, 170)"><line x1="0" y1="0" x2="30" y2="0" stroke="url(#rpflow)" stroke-width="2"/><polygon points="30,-4 38,0 30,4" fill="#4ade80"/></g>

  <!-- Stage 5: Result -->
  <g transform="translate(1000, 95)">
    <rect width="170" height="160" rx="12" fill="#111827" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="85" cy="30" r="16" fill="#00d4ff" opacity="0.2"/>
    <text x="85" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#00d4ff">5</text>
    <text x="85" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#e2e8f0">Response</text>
    <text x="85" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#d1d5db">~2-4k tokens</text>
    <text x="85" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#d1d5db">of precisely</text>
    <text x="85" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#d1d5db">relevant context</text>
    <rect x="15" y="132" width="140" height="18" rx="4" fill="#0a2a3f"/>
    <text x="85" y="145" text-anchor="middle" font-family="monospace" font-size="9" fill="#5ce0d2">ready for LLM</text>
  </g>

  <!-- Bottom: Attribution details -->
  <g transform="translate(40, 290)">
    <rect width="1120" height="170" rx="12" fill="#111827" stroke="#1e293b" stroke-width="1"/>
    <text x="20" y="28" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#e2e8f0">Explainability: Every Result Tells You Why It Was Returned</text>
    <text x="20" y="50" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Each result includes attribution metadata — you can see exactly how and why each piece of context was selected.</text>
    <!-- Vector attribution -->
    <rect x="20" y="65" width="530" height="88" rx="6" fill="#0d1b2a"/>
    <text x="30" y="82" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#5ce0d2">Vector Result Attribution</text>
    <text x="30" y="100" font-family="monospace" font-size="9" fill="#94a3b8">matched_by: "hybrid"     vector_score: 0.89    rrf_score: 0.067</text>
    <text x="30" y="115" font-family="monospace" font-size="9" fill="#94a3b8">vector_rank: 2            bm25_rank: 5          bm25_matched: true</text>
    <text x="30" y="130" font-family="monospace" font-size="9" fill="#94a3b8">source_session: "sess_abc"  source_date: "2025-03-20"  reconstructed: true</text>
    <text x="30" y="145" font-family="monospace" font-size="9" fill="#94a3b8">chunk_count: 3  — stitched 3 adjacent chunks for fuller context</text>
    <!-- Card attribution -->
    <rect x="570" y="65" width="530" height="88" rx="6" fill="#0d1b2a"/>
    <text x="580" y="82" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#c4b5fd">Knowledge Card Attribution</text>
    <text x="580" y="100" font-family="monospace" font-size="9" fill="#94a3b8">source_date: "2025-03-18"     last_accessed: "2025-03-21"</text>
    <text x="580" y="115" font-family="monospace" font-size="9" fill="#94a3b8">decay_score: 0.92             intent_boost: 1.4</text>
    <text x="580" y="130" font-family="monospace" font-size="9" fill="#94a3b8">access_count: 7               evolution: null</text>
    <text x="580" y="145" font-family="monospace" font-size="9" fill="#94a3b8">salience_score: 1.8 — high salience resists memory decay</text>
  </g>
</svg>