<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0f1628"/>
    </linearGradient>
    <linearGradient id="arrow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#7b68ee;stop-opacity:0.8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="340" fill="url(#bg2)" rx="16"/>
  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#e2e8f0" letter-spacing="1">HOW IT WORKS</text>
  <rect x="480" y="55" width="240" height="1.5" fill="url(#arrow-grad)" rx="1"/>
  <!-- Step 1 -->
  <g transform="translate(60, 90)">
    <rect width="240" height="200" rx="12" fill="#111827" stroke="#1e3a5f" stroke-width="1.5"/>
    <circle cx="120" cy="40" r="20" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <text x="120" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#00d4ff">1</text>
    <text x="120" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#f0f4f8">Agent Works</text>
    <text x="120" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Your AI agent codes,</text>
    <text x="120" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">plans, and makes decisions</text>
    <rect x="20" y="148" width="200" height="32" rx="6" fill="#0d1b2a"/>
    <text x="120" y="169" text-anchor="middle" font-family="monospace" font-size="11" fill="#5ce0d2">remember_step(text=...)</text>
  </g>
  <!-- Arrow 1 -->
  <g transform="translate(310, 180)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="url(#arrow-grad)" stroke-width="2" stroke-dasharray="6,4"/>
    <polygon points="60,-5 70,0 60,5" fill="#00d4ff"/>
  </g>
  <!-- Step 2 -->
  <g transform="translate(390, 90)">
    <rect width="240" height="200" rx="12" fill="#111827" stroke="#3b2e7e" stroke-width="1.5"/>
    <circle cx="120" cy="40" r="20" fill="none" stroke="#7b68ee" stroke-width="2"/>
    <text x="120" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#7b68ee">2</text>
    <text x="120" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#f0f4f8">Awareness Extracts</text>
    <text x="120" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Auto-extracts knowledge</text>
    <text x="120" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">cards, tasks, risks</text>
    <rect x="20" y="148" width="200" height="32" rx="6" fill="#0d1b2a"/>
    <text x="120" y="169" text-anchor="middle" font-family="monospace" font-size="11" fill="#c4b5fd">submit_insights(cards=...)</text>
  </g>
  <!-- Arrow 2 -->
  <g transform="translate(640, 180)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="url(#arrow-grad)" stroke-width="2" stroke-dasharray="6,4"/>
    <polygon points="60,-5 70,0 60,5" fill="#7b68ee"/>
  </g>
  <!-- Step 3 -->
  <g transform="translate(720, 90)">
    <rect width="240" height="200" rx="12" fill="#111827" stroke="#1e3a5f" stroke-width="1.5"/>
    <circle cx="120" cy="40" r="20" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <text x="120" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#00d4ff">3</text>
    <text x="120" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#f0f4f8">Next Session Recalls</text>
    <text x="120" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Hybrid retrieval returns</text>
    <text x="120" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">relevant past context</text>
    <rect x="20" y="148" width="200" height="32" rx="6" fill="#0d1b2a"/>
    <text x="120" y="169" text-anchor="middle" font-family="monospace" font-size="11" fill="#5ce0d2">recall_for_task(task=...)</text>
  </g>
  <!-- Loop arrow -->
  <g transform="translate(970, 140)">
    <path d="M0,50 Q80,-30 40,100" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>
    <text x="70" y="60" font-family="system-ui, sans-serif" font-size="11" fill="#5ce0d2" opacity="0.7">continuous</text>
    <text x="70" y="76" font-family="system-ui, sans-serif" font-size="11" fill="#5ce0d2" opacity="0.7">learning</text>
  </g>
</svg>